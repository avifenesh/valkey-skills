name: Sync glide-mq Skills

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC (1h after Version Watch)
  workflow_dispatch:
    inputs:
      ref:
        description: "Upstream ref to sync (branch, tag, or SHA). Defaults to main."
        required: false
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync from upstream avifenesh/glide-mq
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref="${{ github.event.inputs.ref }}"
          scripts/sync-glide-mq-upstream.sh "${ref:-main}"

      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "No drift detected."
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            echo "Drift detected:"
            git status --short
          fi

      - name: Extract pin metadata
        if: steps.drift.outputs.has_drift == 'true'
        id: pin
        run: |
          sha=$(awk -F'`' '/^- Commit SHA:/ {print $2; exit}' UPSTREAM-GLIDE-MQ.md)
          date=$(awk -F': ' '/^- Commit date:/ {print $2; exit}' UPSTREAM-GLIDE-MQ.md)
          ver=$(awk -F'`' '/^- Package version:/ {print $2; exit}' UPSTREAM-GLIDE-MQ.md)
          short_sha="${sha:0:7}"
          echo "sha=${sha}"         >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "date=${date}"       >> "$GITHUB_OUTPUT"
          echo "version=${ver}"     >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.drift.outputs.has_drift == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/sync-glide-mq
          base: main
          commit-message: |
            sync: glide-mq skills from avifenesh/glide-mq@${{ steps.pin.outputs.short_sha }}

            Upstream: avifenesh/glide-mq
            Commit:   ${{ steps.pin.outputs.sha }}
            Date:     ${{ steps.pin.outputs.date }}
            Version:  ${{ steps.pin.outputs.version }}
          title: "sync: glide-mq skills from avifenesh/glide-mq@${{ steps.pin.outputs.short_sha }}"
          body: |
            Upstream skill content drift detected in [avifenesh/glide-mq](https://github.com/avifenesh/glide-mq).

            ## Pin
            - Commit: `${{ steps.pin.outputs.sha }}`
            - Date: ${{ steps.pin.outputs.date }}
            - Version: `${{ steps.pin.outputs.version }}`

            ## Scope
            Sync target: `skills/glide-mq/`, `skills/glide-mq-migrate-bullmq/`, `skills/glide-mq-migrate-bee/` (SKILL.md + `references/`).

            ## Review
            1. Skim the diff for breaking changes - renamed/removed references in particular.
            2. Confirm the three `.claude-plugin/plugin.json` `version` fields still match upstream semver if it bumped.
            3. If satisfied, merge.

            Auto-generated by `.github/workflows/sync-glide-mq.yml`.
          labels: |
            glide-mq-sync
            automated
          delete-branch: true
