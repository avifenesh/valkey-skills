name: Version Watch

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 8:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Semver comparison: returns 0 if $1 > $2
          version_gt() {
            test "$(printf '%s\n' "$1" "$2" | sort -V | tail -1)" != "$2"
          }

          # Component configs: repo|baseline|affected|source
          COMPONENTS=(
            "valkey|valkey-io/valkey|9.0.3|valkey, valkey-dev, valkey-ops|github"
            "valkey-glide|valkey-io/valkey-glide|2.3.0|valkey-glide, all per-language GLIDE skills|github"
            "valkey-search|valkey-io/valkey-search|1.2.0|valkey-ecosystem (modules/search)|github"
            "glide-mq|avifenesh/glide-mq|0.14.0|glide-mq, migrate-bullmq, migrate-bee|npm:glide-mq"
          )

          UPDATES=""

          for entry in "${COMPONENTS[@]}"; do
            IFS='|' read -r name repo baseline affected source <<< "$entry"

            if [[ "$source" == npm:* ]]; then
              pkg="${source#npm:}"
              latest=$(curl -sf "https://registry.npmjs.org/${pkg}/latest" | jq -r '.version // empty' 2>/dev/null || echo "")
            else
              latest=$(gh api "repos/${repo}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
              latest="${latest#v}"
            fi

            if [ -z "$latest" ]; then
              echo "[WARN] Could not fetch latest version for ${name}"
              continue
            fi

            echo "${name}: baseline=${baseline} latest=${latest}"

            if [ "$latest" != "$baseline" ] && version_gt "$latest" "$baseline"; then
              UPDATES="${UPDATES}\n- **${name}**: ${baseline} -> ${latest} (affects: ${affected})"
            fi
          done

          if [ -n "$UPDATES" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            printf "%b" "$UPDATES" > /tmp/updates.txt
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "All components are up to date."
          fi

      - name: Check for existing open issue
        if: steps.check.outputs.has_updates == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh issue list --label "version-update" --state open --json number --jq 'length')
          echo "open_issues=${count}" >> "$GITHUB_OUTPUT"

      - name: Open issue
        if: steps.check.outputs.has_updates == 'true' && steps.existing.outputs.open_issues == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPDATES=$(cat /tmp/updates.txt)
          gh issue create \
            --title "Upstream version updates detected" \
            --label "version-update" \
            --body "$(cat <<EOF
          ## New upstream releases

          The following components have new releases since the skills were last verified:

          ${UPDATES}

          ## What to do

          1. Review release notes for breaking changes or new features
          2. Update affected skills with new API details
          3. Update the Version Baseline table in CLAUDE.md
          4. Close this issue when done

          Current baseline is in [CLAUDE.md](https://github.com/avifenesh/valkey-skills/blob/main/CLAUDE.md#version-baseline).
          EOF
          )"
