services:
  valkey-1:
    image: buggy-valkey:latest
    command: >
      valkey-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7001:7001"
    networks:
      cluster-net:
        ipv4_address: 172.30.0.11

  valkey-2:
    image: buggy-valkey:latest
    command: >
