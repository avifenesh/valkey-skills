version: "3.9"

services:
  valkey:
    image: valkey/valkey:9.0
    container_name: valkey-hardening
    ports:
      - "6403:6379"
    volumes:
      - ./valkey.conf:/etc/valkey/valkey.conf
      - valkey-data:/data
    command: ["valkey-server", "/etc/valkey/valkey.conf"]
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  valkey-data:
    driver: local
