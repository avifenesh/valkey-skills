# Valkey Configuration - Production Instance
# WARNING: This config has not been reviewed for production use

################################## NETWORK ##################################

bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

################################## SECURITY #################################

# No requirepass set
# No ACL file configured

rename-command FLUSHALL ""
rename-command FLUSHDB ""

################################# GENERAL ###################################

daemonize no
loglevel notice
logfile ""
databases 16

################################ SNAPSHOTTING ################################

save ""

################################# REPLICATION ################################

replica-serve-stale-data yes
replica-read-only yes

################################## MEMORY ####################################

# maxmemory not set - uses all available RAM
maxmemory-policy noeviction

############################# LAZY FREEING ###################################

lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no

############################## APPEND ONLY MODE ##############################

appendonly no
appendfilename "appendonly.aof"
appendfsync everysec

################################## TLS #######################################

# TLS disabled - no tls-port, no tls-cert-file, no tls-key-file

############################### THREADING ####################################

io-threads 1
io-threads-do-reads no

############################ SLOW LOG ########################################

slowlog-log-slower-than 10000
slowlog-max-len 10

############################ LATENCY MONITOR #################################

latency-monitor-threshold 0

############################ ACTIVE DEFRAG ###################################

activedefrag no
