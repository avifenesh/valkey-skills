services:
  valkey:
    image: valkey/valkey:8.1
    ports:
      - "6379:6379"
    command: >
      valkey-server
      --loadmodule /opt/valkey-bloom/valkey-bloom.so
      --maxmemory 8gb
      --maxmemory-policy noeviction
      --save ""
    volumes:
      - valkey-data:/data

volumes:
  valkey-data:
