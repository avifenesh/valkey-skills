# =============================================================================
# Valkey Configuration - High-Throughput Session Store
# Production config for 16-core machine with 64GB RAM
# Migrated from Redis 7.2 - last updated 2024-11-15
# =============================================================================

# --- Network ---
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
tcp-keepalive 300
timeout 0
maxclients 10000

# --- Security ---
# Disable dangerous commands (same approach we used on Redis)
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# --- Memory ---
maxmemory 48gb
maxmemory-policy noeviction
maxmemory-samples 5

# --- Persistence ---
# Sessions are transient, no need for persistence
save ""
appendonly no

# --- Logging / Slow Log ---
loglevel notice
logfile /var/log/valkey/valkey.log
# Use Redis slow log to track expensive commands
slowlog-log-slower-than 10000
slowlog-max-len 8

# --- Latency Monitoring ---
latency-monitor-threshold 0

# --- I/O Threads ---
# Not sure if we need these, leaving disabled for now
# io-threads 1

# --- Defragmentation ---
# We had issues with this on Redis, keeping it off
active-defrag-enabled no

# --- Lazy Free ---
# Override defaults to ensure deterministic behavior
lazyfree-lazy-expire no
lazyfree-lazy-eviction no
lazyfree-lazy-server-del no
lazyfree-lazy-user-del no
lazyfree-lazy-user-flush no

# --- Replication ---
# Dual-channel replication - heard about it but not sure if stable
# dual-channel-replication-enabled no
repl-backlog-size 256mb
repl-diskless-sync yes
repl-diskless-sync-delay 5
replica-lazy-flush yes

# --- Encoding Thresholds ---
hash-max-listpack-entries 128
hash-max-listpack-value 64

# --- General ---
databases 16
hz 10
