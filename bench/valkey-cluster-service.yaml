---
# Headless service for StatefulSet DNS and cluster gossip.
# publishNotReadyAddresses ensures DNS records exist during pod restarts
# so replication discovery is not interrupted.
apiVersion: v1
kind: Service
metadata:
  name: valkey-cluster
  namespace: valkey-cluster
  labels:
    app: valkey
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: valkey
  ports:
    - name: client-tls
      port: 6379
      targetPort: 6379
      protocol: TCP
    - name: cluster-bus
      port: 16379
      targetPort: 16379
      protocol: TCP

---
# Client-facing service for application connections.
# In cluster mode clients must handle MOVED/ASK redirects,
# so this service is a convenient entry point, not a proxy.
apiVersion: v1
kind: Service
metadata:
  name: valkey-client
  namespace: valkey-cluster
  labels:
    app: valkey
spec:
  type: ClusterIP
  selector:
    app: valkey
  ports:
    - name: client-tls
      port: 6379
      targetPort: 6379
      protocol: TCP
