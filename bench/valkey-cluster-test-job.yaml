---
# Validation Job - creates a search index, inserts documents, runs queries.
# Apply after the cluster-init Job completes.
apiVersion: batch/v1
kind: Job
metadata:
  name: valkey-cluster-test
  namespace: valkey-cluster
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: valkey-test
    spec:
      restartPolicy: Never
      containers:
        - name: test
          image: valkey/valkey:9-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-secret
                  key: password
          command:
            - sh
            - -c
            - |
              set -e

              HOST="valkey-0.valkey-cluster.valkey-cluster.svc.cluster.local"
              CLI="valkey-cli --tls --cacert /etc/valkey/tls/ca.crt -a $VALKEY_PASSWORD"
              CLIC="$CLI -c"
              PASS=0
              FAIL=0

              assert_ok() {
                if [ $? -eq 0 ]; then
                  echo "[OK] $1"
                  PASS=$((PASS + 1))
                else
                  echo "[ERROR] $1"
                  FAIL=$((FAIL + 1))
                fi
              }

              # --- 1. Cluster health ---
              echo "=== Cluster Health ==="
              CLUSTER_INFO=$($CLI -h "$HOST" CLUSTER INFO)
              echo "$CLUSTER_INFO" | grep -q "cluster_state:ok"
              assert_ok "cluster_state is ok"

              NODES=$(echo "$CLUSTER_INFO" | grep cluster_known_nodes | tr -dc '0-9')
              [ "$NODES" -eq 6 ]
              assert_ok "6 nodes in cluster"

              SLOTS=$(echo "$CLUSTER_INFO" | grep cluster_slots_assigned | tr -dc '0-9')
              [ "$SLOTS" -eq 16384 ]
              assert_ok "16384 slots assigned"

              # --- 2. Search module loaded ---
              echo ""
              echo "=== Search Module ==="
              $CLI -h "$HOST" MODULE LIST | grep -qi "search"
              assert_ok "valkey-search module loaded"

              # --- 3. Create search index ---
              echo ""
              echo "=== Search Index ==="
              RESULT=$($CLI -h "$HOST" FT.CREATE test-idx \
                ON HASH PREFIX 1 "doc:" \
                SCHEMA \
                  title TEXT \
                  category TAG \
                  price NUMERIC 2>&1)
              echo "$RESULT" | grep -qE "OK|Index already exists"
              assert_ok "FT.CREATE test-idx"

              # --- 4. Insert test documents ---
              echo ""
              echo "=== Insert Documents ==="
              $CLIC -h "$HOST" HSET "doc:1" title "Introduction to Valkey" category "database" price 0 > /dev/null
              $CLIC -h "$HOST" HSET "doc:2" title "Search module guide" category "tutorial" price 10 > /dev/null
              $CLIC -h "$HOST" HSET "doc:3" title "Cluster deployment" category "ops" price 5 > /dev/null
              $CLIC -h "$HOST" HSET "doc:4" title "Valkey performance tuning" category "database" price 15 > /dev/null
              $CLIC -h "$HOST" HSET "doc:5" title "Module development in Rust" category "tutorial" price 20 > /dev/null
              assert_ok "Inserted 5 documents"

              # Allow time for background indexing
              sleep 2

              # --- 5. Full-text search ---
              echo ""
              echo "=== Full-Text Search ==="
              RESULT=$($CLI -h "$HOST" FT.SEARCH test-idx "@title:Valkey" 2>&1)
              COUNT=$(echo "$RESULT" | head -1)
              [ "$COUNT" -ge 2 ] 2>/dev/null
              assert_ok "FT.SEARCH @title:Valkey returned $COUNT results (expected >= 2)"

              # --- 6. Tag search ---
              echo ""
              echo "=== Tag Search ==="
              RESULT=$($CLI -h "$HOST" FT.SEARCH test-idx "@category:{tutorial}" 2>&1)
              COUNT=$(echo "$RESULT" | head -1)
              [ "$COUNT" -ge 2 ] 2>/dev/null
              assert_ok "FT.SEARCH @category:{tutorial} returned $COUNT results (expected >= 2)"

              # --- 7. Numeric range search ---
              echo ""
              echo "=== Numeric Range Search ==="
              RESULT=$($CLI -h "$HOST" FT.SEARCH test-idx "@price:[0 5]" 2>&1)
              COUNT=$(echo "$RESULT" | head -1)
              [ "$COUNT" -ge 2 ] 2>/dev/null
              assert_ok "FT.SEARCH @price:[0 5] returned $COUNT results (expected >= 2)"

              # --- 8. Combined query ---
              echo ""
              echo "=== Combined Query ==="
              RESULT=$($CLI -h "$HOST" FT.SEARCH test-idx "@category:{database} @price:[0 20]" 2>&1)
              COUNT=$(echo "$RESULT" | head -1)
              [ "$COUNT" -ge 1 ] 2>/dev/null
              assert_ok "Combined tag+numeric query returned $COUNT results"

              # --- 9. TLS verification ---
              echo ""
              echo "=== TLS ==="
              TLS_INFO=$($CLI -h "$HOST" INFO server | grep tcp_port)
              echo "$TLS_INFO" | grep -q "tcp_port:0"
              assert_ok "Plaintext port disabled (tcp_port:0)"

              # --- Summary ---
              echo ""
              echo "=== Results ==="
              TOTAL=$((PASS + FAIL))
              echo "$PASS/$TOTAL passed"
              if [ "$FAIL" -gt 0 ]; then
                echo "[ERROR] $FAIL test(s) failed"
                exit 1
              fi
              echo "[OK] All tests passed"
          volumeMounts:
            - name: tls
              mountPath: /etc/valkey/tls
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: valkey-tls
            defaultMode: 0400
